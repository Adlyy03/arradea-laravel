<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple FCM Test</title>
    <style>
        body {
            font-family: monospace;
            background: #000;
            color: #0f0;
            padding: 20px;
        }
        .log { margin: 5px 0; }
        .error { color: #f00; }
        .success { color: #0f0; }
        .warning { color: #ff0; }
    </style>
</head>
<body>
    <h1>Simple FCM Test</h1>
    <div id="log"></div>

    <script type="module">
        function log(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = `log ${type}`;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            document.getElementById('log').appendChild(div);
            console.log(msg);
        }

        async function test() {
            try {
                log('Starting FCM test...', 'info');

                // Check SW
                const regs = await navigator.serviceWorker.getRegistrations();
                log(`Service Workers: ${regs.length}`, 'info');
                regs.forEach(reg => {
                    log(`  - ${reg.active?.scriptURL}`, 'info');
                });

                // Check permission
                log(`Permission: ${Notification.permission}`, 'info');

                if (Notification.permission !== 'granted') {
                    log('ERROR: Permission not granted!', 'error');
                    return;
                }

                // Import Firebase
                log('Importing Firebase...', 'info');
                const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js');
                const { getMessaging, getToken, onMessage } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js');

                const app = initializeApp({
                    apiKey: "AIzaSyDr3GsRZJgSjw6dVSF_dqUXi1osHxIRmQo",
                    authDomain: "arradea-marketplace.firebaseapp.com",
                    projectId: "arradea-marketplace",
                    storageBucket: "arradea-marketplace.firebasestorage.app",
                    messagingSenderId: "574490534147",
                    appId: "1:574490534147:web:175e9ba85a2e4100b70936"
                });

                log('Firebase initialized', 'success');

                const messaging = getMessaging(app);
                log('Messaging initialized', 'success');

                // Setup handler FIRST
                log('Setting up message handler...', 'info');
                onMessage(messaging, (payload) => {
                    log('='.repeat(60), 'success');
                    log('MESSAGE RECEIVED!!!', 'success');
                    log(`Title: ${payload.notification?.title}`, 'success');
                    log(`Body: ${payload.notification?.body}`, 'success');
                    log('='.repeat(60), 'success');

                    // Show notification
                    new Notification(payload.notification.title, {
                        body: payload.notification.body,
                        icon: '/icons/logo-arradea.png'
                    });
                });

                log('Handler setup complete', 'success');

                // Get token
                log('Getting token...', 'info');
                const registration = await navigator.serviceWorker.ready;
                const token = await getToken(messaging, {
                    vapidKey: 'BIxSwfnWuLkFS5RpKwj-AJKqx6HAHQBLifRuG_1VoMn08Ag9jkqNCYqoHUI02rUMdIwg1U69nFRsTXgTrBE7sCA',
                    serviceWorkerRegistration: registration
                });

                if (token) {
                    log('Token: ' + token.substring(0, 30) + '...', 'success');
                    log('='.repeat(60), 'success');
                    log('FCM READY! Listening for messages...', 'success');
                    log('Run: php test-fcm-comprehensive.php', 'warning');
                    log('='.repeat(60), 'success');
                } else {
                    log('ERROR: No token!', 'error');
                }

            } catch (error) {
                log('ERROR: ' + error.message, 'error');
                console.error(error);
            }
        }

        window.addEventListener('load', () => {
            setTimeout(test, 500);
        });
    </script>
</body>
</html>
