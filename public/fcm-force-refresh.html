<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCM Force Refresh Token</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 700px;
            width: 100%;
            background: rgba(0,0,0,0.9);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            text-align: center;
        }
        h1 { 
            font-size: 36px;
            margin-bottom: 10px;
            color: #4ec9b0;
        }
        .subtitle {
            font-size: 16px;
            margin-bottom: 30px;
            color: #9cdcfe;
        }
        .btn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            padding: 25px 50px;
            border-radius: 12px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
            transition: all 0.3s;
        }
        .btn:hover { 
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(17, 153, 142, 0.4);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .status {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            font-size: 16px;
            line-height: 1.8;
            text-align: left;
        }
        .status.success {
            background: rgba(78, 201, 176, 0.2);
            border: 2px solid #4ec9b0;
        }
        .status.error {
            background: rgba(244, 135, 113, 0.2);
            border: 2px solid #f48771;
        }
        .status.info {
            background: rgba(156, 220, 254, 0.2);
            border: 2px solid #9cdcfe;
        }
        .token-box {
            background: #1e1e1e;
            border: 1px solid #3e3e42;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            word-break: break-all;
            text-align: left;
        }
        .highlight {
            color: #ffc107;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 Force Refresh Token</h1>
        <div class="subtitle">Generate token baru dan kirim notifikasi langsung</div>

        <button class="btn" onclick="forceRefreshAndTest()" id="mainBtn">
            🚀 REFRESH TOKEN & TEST SEKARANG
        </button>

        <div id="status" class="status info" style="display: none;"></div>
        <div id="tokenBox" class="token-box" style="display: none;"></div>
    </div>

    <script type="module">
        function showStatus(message, type = 'info') {
            const statusEl = document.getElementById('status');
            statusEl.innerHTML = message;
            statusEl.className = `status ${type}`;
            statusEl.style.display = 'block';
        }

        function showToken(token) {
            const tokenBox = document.getElementById('tokenBox');
            tokenBox.textContent = `Token: ${token}`;
            tokenBox.style.display = 'block';
        }

        window.forceRefreshAndTest = async function() {
            const btn = document.getElementById('mainBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Processing...';

            try {
                showStatus('🔄 Step 1/5: Checking permission...', 'info');

                // Check permission
                if (Notification.permission !== 'granted') {
                    const permission = await Notification.requestPermission();
                    if (permission !== 'granted') {
                        throw new Error('Permission denied');
                    }
                }

                showStatus('✅ Step 1/5: Permission OK<br>🔄 Step 2/5: Unregistering old service workers...', 'info');

                // Unregister ALL service workers
                const registrations = await navigator.serviceWorker.getRegistrations();
                for (let registration of registrations) {
                    await registration.unregister();
                }

                showStatus('✅ Step 2/5: Old service workers removed<br>🔄 Step 3/5: Registering fresh service worker...', 'info');

                // Register fresh service worker
                const registration = await navigator.serviceWorker.register('/firebase-messaging-sw.js', {
                    scope: '/',
                    updateViaCache: 'none'
                });
                await navigator.serviceWorker.ready;

                showStatus('✅ Step 3/5: Fresh service worker registered<br>🔄 Step 4/5: Getting NEW FCM token...', 'info');

                // Load Firebase
                const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js');
                const { getMessaging, getToken, onMessage } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js');

                const app = initializeApp({
                    apiKey: "AIzaSyDr3GsRZJgSjw6dVSF_dqUXi1osHxIRmQo",
                    authDomain: "arradea-marketplace.firebaseapp.com",
                    projectId: "arradea-marketplace",
                    storageBucket: "arradea-marketplace.firebasestorage.app",
                    messagingSenderId: "574490534147",
                    appId: "1:574490534147:web:175e9ba85a2e4100b70936"
                });

                const messaging = getMessaging(app);

                // Setup message handler FIRST
                onMessage(messaging, (payload) => {
                    console.log('📬 FCM Message received:', payload);
                    
                    const title = payload.notification?.title || 'New Notification';
                    const body = payload.notification?.body || '';
                    
                    new Notification(title, {
                        body: body,
                        icon: '/icons/logo-arradea.png',
                        badge: '/icons/logo-arradea.png'
                    });

                    showStatus(`
                        ✅ Step 5/5: NOTIFIKASI DITERIMA!<br><br>
                        <span class="highlight">📬 SUKSES! Notifikasi muncul!</span><br><br>
                        Title: ${title}<br>
                        Body: ${body}
                    `, 'success');
                });

                // Get NEW token
                const swReg = await navigator.serviceWorker.ready;
                const newToken = await getToken(messaging, {
                    vapidKey: 'BIxSwfnWuLkFS5RpKwj-AJKqx6HAHQBLifRuG_1VoMn08Ag9jkqNCYqoHUI02rUMdIwg1U69nFRsTXgTrBE7sCA',
                    serviceWorkerRegistration: swReg
                });

                if (!newToken) {
                    throw new Error('Failed to get FCM token');
                }

                console.log('New token:', newToken);
                showToken(newToken);

                showStatus(`
                    ✅ Step 4/5: NEW token generated!<br>
                    Token: ${newToken.substring(0, 30)}...<br><br>
                    🔄 Step 5/5: Saving token and sending test notification...
                `, 'info');

                // Save token to backend
                const saveResponse = await fetch('/save-fcm-token-public', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ fcm_token: newToken })
                });

                if (!saveResponse.ok) {
                    console.warn('Failed to save token:', await saveResponse.text());
                    throw new Error('Failed to save token to backend');
                }

                const saveData = await saveResponse.json();
                console.log('Token saved:', saveData);

                // Wait a bit for token to be saved
                await new Promise(resolve => setTimeout(resolve, 1000));

                // Send test notification
                const testResponse = await fetch('/api/test-notification-public', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    }
                });

                const testData = await testResponse.json();
                console.log('Test response:', testData);

                if (testData.success) {
                    showStatus(`
                        ✅ Step 5/5: Notification sent from backend!<br><br>
                        <span class="highlight">⏰ Waiting for notification to appear...</span><br><br>
                        Sent to: ${testData.total} device(s)<br>
                        Successful: ${testData.successful}<br><br>
                        💡 Check pojok kanan bawah atau notification center!<br>
                        💡 Notification should appear in 1-2 seconds...
                    `, 'success');
                } else {
                    throw new Error('Backend failed: ' + testData.message);
                }

            } catch (error) {
                console.error('Error:', error);
                showStatus(`
                    ❌ ERROR: ${error.message}<br><br>
                    Stack: ${error.stack}
                `, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '🚀 REFRESH TOKEN & TEST SEKARANG';
            }
        };

        // Auto-run on load
        window.addEventListener('load', () => {
            console.log('Page loaded. Click button to start.');
        });
    </script>
</body>
</html>
