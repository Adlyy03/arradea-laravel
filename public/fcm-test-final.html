<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCM Test - Final</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(0,0,0,0.9);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        h1 { 
            font-size: 36px;
            margin-bottom: 20px;
            text-align: center;
            color: #4ec9b0;
        }
        .subtitle {
            text-align: center;
            font-size: 18px;
            margin-bottom: 30px;
            color: #9cdcfe;
        }
        .status {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .status-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            margin-bottom: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            font-size: 16px;
        }
        .status-value {
            font-weight: bold;
        }
        .ok { color: #4ec9b0; }
        .error { color: #f48771; }
        .warning { color: #dcdcaa; }
        .btn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            padding: 20px 40px;
            border-radius: 12px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
            transition: all 0.3s;
        }
        .btn:hover { 
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(17, 153, 142, 0.4);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .log-box {
            background: #1e1e1e;
            border-radius: 12px;
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 20px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
        }
        .log-entry {
            margin-bottom: 6px;
            line-height: 1.6;
        }
        .log-entry.success { color: #4ec9b0; }
        .log-entry.error { color: #f48771; }
        .log-entry.warning { color: #dcdcaa; }
        .log-entry.info { color: #9cdcfe; }
        .log-entry.message { 
            color: #ce9178; 
            font-weight: bold;
            font-size: 16px;
            background: rgba(206, 145, 120, 0.1);
            padding: 8px;
            border-radius: 4px;
            margin: 8px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 FCM Test - Final</h1>
        <div class="subtitle">Klik tombol untuk test notifikasi</div>

        <div class="status">
            <div class="status-item">
                <span>🔧 Service Worker:</span>
                <span class="status-value warning" id="sw-status">Checking...</span>
            </div>
            <div class="status-item">
                <span>🔔 Permission:</span>
                <span class="status-value warning" id="perm-status">Checking...</span>
            </div>
            <div class="status-item">
                <span>🔑 FCM Token:</span>
                <span class="status-value warning" id="token-status">Checking...</span>
            </div>
            <div class="status-item">
                <span>📨 Messages Received:</span>
                <span class="status-value ok" id="msg-count">0</span>
            </div>
        </div>

        <button type="button" class="btn" id="testBtn" onclick="sendTestNotification()" disabled>
            🚀 Send Test Notification
        </button>

        <div class="log-box" id="logBox"></div>
    </div>

    <script type="module">
        let messageCount = 0;
        let messaging = null;
        let fcmToken = null;

        function log(message, type = 'info') {
            const logBox = document.getElementById('logBox');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            entry.textContent = `[${timestamp}] ${message}`;
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function updateStatus(id, value, className) {
            const el = document.getElementById(id);
            el.textContent = value;
            el.className = `status-value ${className}`;
        }

        window.sendTestNotification = async function() {
            const btn = document.getElementById('testBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Sending...';

            try {
                log('='.repeat(60), 'info');
                log('🚀 Sending notification...', 'info');

                const response = await fetch('/api/test-notification-public', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    }
                });

                const data = await response.json();
                
                log('Backend response:', 'info');
                log(JSON.stringify(data, null, 2), 'info');

                if (data.success) {
                    log('✅ Notification sent successfully!', 'success');
                    log(`Sent to ${data.total} device(s)`, 'success');
                    log('Check your browser for notification!', 'warning');
                } else {
                    log('❌ Failed: ' + data.message, 'error');
                }

            } catch (error) {
                log('❌ Error: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '🚀 Send Test Notification';
            }
        };

        async function init() {
            try {
                log('='.repeat(60), 'info');
                log('🚀 Initializing FCM...', 'info');
                log('='.repeat(60), 'info');

                // Check/Register SW
                log('Checking service worker...', 'info');
                let registration = await navigator.serviceWorker.getRegistration('/');
                
                if (!registration || !registration.active?.scriptURL.includes('firebase-messaging-sw.js')) {
                    log('Registering firebase-messaging-sw.js...', 'warning');
                    registration = await navigator.serviceWorker.register('/firebase-messaging-sw.js', {
                        scope: '/',
                        updateViaCache: 'none'
                    });
                    await navigator.serviceWorker.ready;
                }

                log('✅ Service worker ready', 'success');
                updateStatus('sw-status', 'OK ✅', 'ok');

                // Check permission
                let permission = Notification.permission;
                if (permission !== 'granted') {
                    log('Requesting permission...', 'warning');
                    permission = await Notification.requestPermission();
                }

                if (permission === 'granted') {
                    log('✅ Permission granted', 'success');
                    updateStatus('perm-status', 'GRANTED ✅', 'ok');
                } else {
                    log('❌ Permission denied', 'error');
                    updateStatus('perm-status', 'DENIED ❌', 'error');
                    return;
                }

                // Import Firebase
                log('Loading Firebase SDK...', 'info');
                const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js');
                const { getMessaging, getToken, onMessage } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js');

                const app = initializeApp({
                    apiKey: "AIzaSyDr3GsRZJgSjw6dVSF_dqUXi1osHxIRmQo",
                    authDomain: "arradea-marketplace.firebaseapp.com",
                    projectId: "arradea-marketplace",
                    storageBucket: "arradea-marketplace.firebasestorage.app",
                    messagingSenderId: "574490534147",
                    appId: "1:574490534147:web:175e9ba85a2e4100b70936"
                });

                log('✅ Firebase initialized', 'success');

                messaging = getMessaging(app);
                log('✅ Messaging initialized', 'success');

                // Setup handler FIRST before getting token
                log('Setting up message handler...', 'info');
                onMessage(messaging, (payload) => {
                    messageCount++;
                    document.getElementById('msg-count').textContent = messageCount;

                    log('='.repeat(60), 'message');
                    log('📬 NOTIFICATION RECEIVED!!!', 'message');
                    log('='.repeat(60), 'message');
                    log(`Title: ${payload.notification?.title}`, 'success');
                    log(`Body: ${payload.notification?.body}`, 'success');
                    log('='.repeat(60), 'message');

                    // Show notification
                    new Notification(payload.notification.title, {
                        body: payload.notification.body,
                        icon: '/icons/logo-arradea.png',
                        badge: '/icons/logo-arradea.png'
                    });

                    log('✅ Notification displayed!', 'success');
                });

                log('✅ Handler setup complete', 'success');

                // Get token
                log('Getting FCM token...', 'info');
                const swReg = await navigator.serviceWorker.ready;
                fcmToken = await getToken(messaging, {
                    vapidKey: 'BIxSwfnWuLkFS5RpKwj-AJKqx6HAHQBLifRuG_1VoMn08Ag9jkqNCYqoHUI02rUMdIwg1U69nFRsTXgTrBE7sCA',
                    serviceWorkerRegistration: swReg
                });

                if (fcmToken) {
                    log('✅ Token: ' + fcmToken.substring(0, 30) + '...', 'success');
                    updateStatus('token-status', 'OK ✅', 'ok');
                    
                    // Save token to backend
                    log('Saving token to backend...', 'info');
                    const saveResponse = await fetch('/save-fcm-token', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json',
                            'X-CSRF-TOKEN': 'test'
                        },
                        body: JSON.stringify({ fcm_token: fcmToken })
                    });
                    
                    if (saveResponse.ok) {
                        log('✅ Token saved to backend', 'success');
                    } else {
                        log('⚠️ Failed to save token (but FCM will still work)', 'warning');
                    }
                } else {
                    log('❌ No token obtained', 'error');
                    updateStatus('token-status', 'FAILED ❌', 'error');
                    return;
                }

                log('='.repeat(60), 'success');
                log('🎉 FCM READY!', 'success');
                log('='.repeat(60), 'success');
                log('✅ Click "Send Test Notification" button!', 'success');
                log('='.repeat(60), 'success');

                document.getElementById('testBtn').disabled = false;

            } catch (error) {
                log('='.repeat(60), 'error');
                log('❌ ERROR: ' + error.message, 'error');
                log('Stack: ' + error.stack, 'error');
                log('='.repeat(60), 'error');
            }
        }

        window.addEventListener('load', () => {
            setTimeout(init, 500);
        });
    </script>
</body>
</html>
