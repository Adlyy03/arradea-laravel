<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCM Live Debug - Arradea</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 { color: #4ec9b0; margin-bottom: 20px; }
        .log-box {
            background: #252526;
            border: 1px solid #3e3e42;
            border-radius: 8px;
            padding: 20px;
            height: 600px;
            overflow-y: auto;
            margin-bottom: 20px;
        }
        .log-entry {
            margin-bottom: 8px;
            line-height: 1.5;
            padding: 4px 0;
        }
        .log-entry.success { color: #4ec9b0; }
        .log-entry.error { color: #f48771; }
        .log-entry.warning { color: #dcdcaa; }
        .log-entry.info { color: #9cdcfe; }
        .log-entry.message { color: #ce9178; font-weight: bold; }
        .status {
            background: #252526;
            border: 1px solid #3e3e42;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .status-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 8px;
            background: #1e1e1e;
            border-radius: 4px;
        }
        .status-label { color: #9cdcfe; }
        .status-value { color: #4ec9b0; font-weight: bold; }
        .status-value.error { color: #f48771; }
        .btn {
            background: #0e639c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        .btn:hover { background: #1177bb; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔴 FCM Live Debug Monitor</h1>
        
        <div class="status">
            <div class="status-item">
                <span class="status-label">Service Worker:</span>
                <span class="status-value" id="sw-status">Checking...</span>
            </div>
            <div class="status-item">
                <span class="status-label">Permission:</span>
                <span class="status-value" id="perm-status">Checking...</span>
            </div>
            <div class="status-item">
                <span class="status-label">FCM Token:</span>
                <span class="status-value" id="token-status">Checking...</span>
            </div>
            <div class="status-item">
                <span class="status-label">Foreground Handler:</span>
                <span class="status-value" id="handler-status">Checking...</span>
            </div>
            <div class="status-item">
                <span class="status-label">Messages Received:</span>
                <span class="status-value" id="msg-count">0</span>
            </div>
        </div>

        <div>
            <button type="button" class="btn" onclick="testManual()">Test Manual Notification</button>
            <button type="button" class="btn" onclick="clearLogs()">Clear Logs</button>
        </div>

        <div class="log-box" id="logBox">
            <div class="log-entry info">🔴 Live monitoring started...</div>
            <div class="log-entry info">Waiting for FCM messages...</div>
        </div>
    </div>

    <script type="module">
        let messageCount = 0;

        function log(message, type = 'info') {
            const logBox = document.getElementById('logBox');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            entry.textContent = `[${timestamp}] ${message}`;
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight;
            console.log(`[${type.toUpperCase()}] ${message}`);
        }

        function updateStatus(id, value, isError = false) {
            const el = document.getElementById(id);
            el.textContent = value;
            el.className = isError ? 'status-value error' : 'status-value';
        }

        window.testManual = function() {
            if (Notification.permission !== 'granted') {
                log('❌ Permission not granted', 'error');
                return;
            }
            new Notification('🧪 Manual Test', {
                body: 'This is a manual test notification',
                icon: '/icons/logo-arradea.png'
            });
            log('✅ Manual notification sent', 'success');
        };

        window.clearLogs = function() {
            document.getElementById('logBox').innerHTML = '';
            log('Logs cleared', 'info');
        };

        async function init() {
            log('='.repeat(60), 'info');
            log('🚀 Initializing FCM Live Debug...', 'info');
            log('='.repeat(60), 'info');

            try {
                // Check Service Worker
                log('Checking Service Worker...', 'info');
                const registrations = await navigator.serviceWorker.getRegistrations();
                
                let hasFirebaseSW = false;
                registrations.forEach(reg => {
                    const scriptURL = reg.active?.scriptURL || 'N/A';
                    log(`SW: ${scriptURL}`, 'info');
                    if (scriptURL.includes('firebase-messaging-sw.js')) {
                        hasFirebaseSW = true;
                        updateStatus('sw-status', 'OK ✅');
                    }
                });

                if (!hasFirebaseSW) {
                    log('❌ Firebase SW not found!', 'error');
                    updateStatus('sw-status', 'NOT FOUND ❌', true);
                    return;
                }

                // Check Permission
                log('Checking Permission...', 'info');
                const permission = Notification.permission;
                log(`Permission: ${permission}`, 'info');
                
                if (permission === 'granted') {
                    updateStatus('perm-status', 'GRANTED ✅');
                } else {
                    updateStatus('perm-status', permission.toUpperCase() + ' ❌', true);
                    log('❌ Permission not granted', 'error');
                    return;
                }

                // Initialize Firebase
                log('Initializing Firebase...', 'info');
                const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js');
                const { getMessaging, getToken, onMessage } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js');

                const firebaseConfig = {
                    apiKey: "AIzaSyDr3GsRZJgSjw6dVSF_dqUXi1osHxIRmQo",
                    authDomain: "arradea-marketplace.firebaseapp.com",
                    projectId: "arradea-marketplace",
                    storageBucket: "arradea-marketplace.firebasestorage.app",
                    messagingSenderId: "574490534147",
                    appId: "1:574490534147:web:175e9ba85a2e4100b70936"
                };

                const app = initializeApp(firebaseConfig);
                log('✅ Firebase initialized', 'success');

                const messaging = getMessaging(app);
                log('✅ Messaging initialized', 'success');

                // Get Token
                log('Getting FCM token...', 'info');
                const registration = await navigator.serviceWorker.ready;
                const token = await getToken(messaging, {
                    vapidKey: 'BIxSwfnWuLkFS5RpKwj-AJKqx6HAHQBLifRuG_1VoMn08Ag9jkqNCYqoHUI02rUMdIwg1U69nFRsTXgTrBE7sCA',
                    serviceWorkerRegistration: registration
                });

                if (token) {
                    log('✅ FCM Token obtained!', 'success');
                    log(`Token: ${token.substring(0, 30)}...`, 'info');
                    updateStatus('token-status', 'OK ✅');
                } else {
                    log('❌ No token obtained', 'error');
                    updateStatus('token-status', 'FAILED ❌', true);
                }

                // Setup Foreground Handler
                log('='.repeat(60), 'info');
                log('📬 Setting up FOREGROUND MESSAGE HANDLER...', 'info');
                log('='.repeat(60), 'info');

                onMessage(messaging, (payload) => {
                    messageCount++;
                    document.getElementById('msg-count').textContent = messageCount;

                    log('='.repeat(60), 'message');
                    log('📬 FOREGROUND MESSAGE RECEIVED!', 'message');
                    log('='.repeat(60), 'message');
                    log(`Title: ${payload.notification?.title}`, 'success');
                    log(`Body: ${payload.notification?.body}`, 'success');
                    log(`Data: ${JSON.stringify(payload.data)}`, 'info');
                    log('='.repeat(60), 'message');

                    // Show notification
                    if (Notification.permission === 'granted') {
                        const notif = new Notification(payload.notification.title, {
                            body: payload.notification.body,
                            icon: '/icons/logo-arradea.png',
                            badge: '/icons/logo-arradea.png',
                            tag: 'fcm-' + Date.now()
                        });

                        log('✅ Notification displayed!', 'success');

                        notif.onclick = () => {
                            log('🖱️ Notification clicked!', 'info');
                            if (payload.data?.click_action) {
                                window.open(payload.data.click_action, '_blank');
                            }
                            notif.close();
                        };
                    }
                });

                log('✅ Foreground handler setup complete!', 'success');
                updateStatus('handler-status', 'ACTIVE ✅');

                log('='.repeat(60), 'info');
                log('🎉 FCM Live Debug Ready!', 'success');
                log('='.repeat(60), 'info');
                log('📡 Listening for messages...', 'info');
                log('💡 Send a message or create an order to test!', 'info');

            } catch (error) {
                log('='.repeat(60), 'error');
                log('❌ ERROR: ' + error.message, 'error');
                log('='.repeat(60), 'error');
                console.error(error);
            }
        }

        // Auto-init on load
        window.addEventListener('load', () => {
            setTimeout(init, 500);
        });

        // Don't intercept console logs to avoid infinite loop
    </script>
</body>
</html>
