<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Arradea</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #f0faf1 0%, #ffffff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 500px;
        }
        .icon {
            width: 96px;
            height: 96px;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }
        .icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 24px;
            display: block;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        h1 {
            font-size: 32px;
            font-weight: 900;
            color: #1f2937;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }
        .highlight {
            color: #72bf77;
        }
        p {
            font-size: 16px;
            color: #6b7280;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: #72bf77;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(114, 191, 119, 0.4);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(114, 191, 119, 0.5);
        }
        .btn:active {
            transform: translateY(0);
        }
        .status {
            margin-top: 24px;
            padding: 12px 20px;
            background: rgba(114, 191, 119, 0.1);
            border: 1px solid rgba(114, 191, 119, 0.2);
            border-radius: 12px;
            font-size: 14px;
            color: #3fa348;
            font-weight: 600;
        }
        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(114, 191, 119, 0.3);
            border-top-color: #72bf77;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon"><img src="/icons/logo-arradea.png" alt="Arradea"></div>
        <h1>Kamu sedang <span class="highlight">Offline</span></h1>
        <p>Sepertinya koneksi internet kamu terputus. Coba periksa koneksi dan muat ulang halaman.</p>
        <a href="/" class="btn" onclick="window.location.reload(); return false;">🔄 Muat Ulang</a>
        <div class="status" id="status">
            <span class="spinner"></span>
            Menunggu koneksi...
        </div>
    </div>

    <script>
        // Auto-reload when back online
        window.addEventListener('online', () => {
            document.getElementById('status').innerHTML = '✅ Koneksi kembali! Memuat ulang...';
            setTimeout(() => {
                window.location.reload();
            }, 1000);
        });

        // Update status
        function updateStatus() {
            const status = document.getElementById('status');
            if (navigator.onLine) {
                status.innerHTML = '✅ Koneksi tersedia! Klik tombol untuk muat ulang.';
            } else {
                status.innerHTML = '<span class="spinner"></span> Menunggu koneksi...';
            }
        }

        // Check connection every 3 seconds
        setInterval(updateStatus, 3000);
        updateStatus();
    </script>
</body>
</html>
