<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCM Notification Test - Arradea</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .status-box {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .status-item:last-child {
            border-bottom: none;
        }
        
        .status-label {
            font-weight: 600;
            color: #555;
        }
        
        .status-value {
            font-family: 'Courier New', monospace;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
        
        .status-value.success {
            background: #d4edda;
            color: #155724;
        }
        
        .status-value.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .status-value.warning {
            background: #fff3cd;
            color: #856404;
        }
        
        .status-value.info {
            background: #d1ecf1;
            color: #0c5460;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .log-box {
            background: #1e1e1e;
            color: #d4d4d4;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.6;
        }
        
        .log-entry {
            margin-bottom: 5px;
        }
        
        .log-entry.success { color: #4ec9b0; }
        .log-entry.error { color: #f48771; }
        .log-entry.warning { color: #dcdcaa; }
        .log-entry.info { color: #9cdcfe; }
        
        .section {
            margin-bottom: 30px;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔔 FCM Notification Test</h1>
        <p class="subtitle">Comprehensive Firebase Cloud Messaging Diagnostic Tool</p>
        
        <div class="section">
            <div class="section-title">System Status</div>
            <div class="status-box" id="statusBox">
                <div class="status-item">
                    <span class="status-label">Browser Support:</span>
                    <span class="status-value" id="browserSupport">Checking...</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Service Worker:</span>
                    <span class="status-value" id="serviceWorkerStatus">Checking...</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Notification Permission:</span>
                    <span class="status-value" id="notificationPermission">Checking...</span>
                </div>
                <div class="status-item">
                    <span class="status-label">FCM Token:</span>
                    <span class="status-value" id="fcmToken">Not generated</span>
                </div>
            </div>
        </div>
        
        <div class="section">
            <div class="section-title">Actions</div>
            <button class="btn" id="checkSystemBtn" onclick="checkSystem()">
                🔍 Check System Status
            </button>
            <button class="btn" id="requestPermissionBtn" onclick="requestNotificationPermission()">
                🔔 Request Notification Permission
            </button>
            <button class="btn btn-secondary" id="testNotificationBtn" onclick="testNotification()">
                🧪 Test Browser Notification
            </button>
            <button class="btn btn-secondary" id="checkServiceWorkerBtn" onclick="checkServiceWorkerDetails()">
                ⚙️ Check Service Worker Details
            </button>
        </div>
        
        <div class="section">
            <div class="section-title">Debug Log</div>
            <div class="log-box" id="logBox"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getMessaging, getToken, onMessage } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js';

        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDr3GsRZJgSjw6dVSF_dqUXi1osHxIRmQo",
            authDomain: "arradea-marketplace.firebaseapp.com",
            projectId: "arradea-marketplace",
            storageBucket: "arradea-marketplace.firebasestorage.app",
            messagingSenderId: "574490534147",
            appId: "1:574490534147:web:175e9ba85a2e4100b70936"
        };

        const vapidKey = 'BIxSwfnWuLkFS5RpKwj-AJKqx6HAHQBLifRuG_1VoMn08Ag9jkqNCYqoHUI02rUMdIwg1U69nFRsTXgTrBE7sCA';

        let app, messaging;

        // Initialize Firebase
        try {
            app = initializeApp(firebaseConfig);
            messaging = getMessaging(app);
            log('✅ Firebase initialized successfully', 'success');
        } catch (error) {
            log('❌ Firebase initialization error: ' + error.message, 'error');
        }

        // Setup foreground message handler
        if (messaging) {
            onMessage(messaging, (payload) => {
                log('='.repeat(50), 'info');
                log('📬 FOREGROUND MESSAGE RECEIVED', 'success');
                log('='.repeat(50), 'info');
                log('Payload: ' + JSON.stringify(payload, null, 2), 'info');
                
                // Show browser notification
                if (Notification.permission === 'granted') {
                    const notif = new Notification(
                        payload.notification?.title || 'Test Notification',
                        {
                            body: payload.notification?.body || 'Test body',
                            icon: '/icons/logo-arradea.png'
                        }
                    );
                    log('✅ Browser notification shown', 'success');
                }
            });
        }

        // Make functions global
        window.checkSystem = checkSystem;
        window.requestNotificationPermission = requestNotificationPermission;
        window.testNotification = testNotification;
        window.checkServiceWorkerDetails = checkServiceWorkerDetails;
        window.log = log;
        window.messaging = messaging;
        window.getToken = getToken;
        window.vapidKey = vapidKey;

        // Auto-check on load
        setTimeout(checkSystem, 500);

        function log(message, type = 'info') {
            const logBox = document.getElementById('logBox');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            entry.textContent = `[${timestamp}] ${message}`;
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight;
            console.log(message);
        }

        function updateStatus(elementId, text, type) {
            const element = document.getElementById(elementId);
            element.textContent = text;
            element.className = `status-value ${type}`;
        }

        async function checkSystem() {
            log('🔍 Checking system status...', 'info');
            
            // Check browser support
            const hasNotification = 'Notification' in window;
            const hasServiceWorker = 'serviceWorker' in navigator;
            const hasPromise = 'Promise' in window;
            
            if (hasNotification && hasServiceWorker && hasPromise) {
                updateStatus('browserSupport', 'Supported ✓', 'success');
                log('✅ Browser supports notifications', 'success');
            } else {
                updateStatus('browserSupport', 'Not Supported ✗', 'error');
                log('❌ Browser does not support notifications', 'error');
                return;
            }
            
            // Check notification permission
            const permission = Notification.permission;
            updateStatus('notificationPermission', permission, 
                permission === 'granted' ? 'success' : 
                permission === 'denied' ? 'error' : 'warning');
            log(`📋 Notification permission: ${permission}`, 
                permission === 'granted' ? 'success' : 'warning');
            
            // Check service worker
            try {
                const registrations = await navigator.serviceWorker.getRegistrations();
                log(`📝 Found ${registrations.length} service worker(s)`, 'info');
                
                if (registrations.length > 0) {
                    updateStatus('serviceWorkerStatus', 'Active ✓', 'success');
                    registrations.forEach((reg, index) => {
                        log(`  SW ${index + 1}: ${reg.scope}`, 'info');
                        log(`  State: ${reg.active?.state || 'unknown'}`, 'info');
                    });
                } else {
                    updateStatus('serviceWorkerStatus', 'Not Registered', 'warning');
                    log('⚠️ No service worker registered', 'warning');
                }
            } catch (error) {
                updateStatus('serviceWorkerStatus', 'Error', 'error');
                log('❌ Error checking service worker: ' + error.message, 'error');
            }
            
            // Try to get FCM token if permission granted
            if (permission === 'granted' && messaging) {
                try {
                    log('🔑 Attempting to get FCM token...', 'info');
                    const token = await getToken(messaging, { 
                        vapidKey: vapidKey,
                        serviceWorkerRegistration: await navigator.serviceWorker.ready
                    });
                    
                    if (token) {
                        updateStatus('fcmToken', token.substring(0, 30) + '...', 'success');
                        log('✅ FCM Token obtained', 'success');
                        log('Token: ' + token, 'info');
                    }
                } catch (error) {
                    log('❌ Error getting FCM token: ' + error.message, 'error');
                }
            }
            
            log('✅ System check complete', 'success');
        }

        async function requestNotificationPermission() {
            log('🔔 Requesting notification permission...', 'info');
            
            try {
                // Register service worker first
                log('📝 Registering service worker...', 'info');
                const registration = await navigator.serviceWorker.register('/firebase-messaging-sw.js', {
                    scope: '/',
                    updateViaCache: 'none'
                });
                log('✅ Service worker registered', 'success');
                
                await navigator.serviceWorker.ready;
                log('✅ Service worker ready', 'success');
                
                // Request permission
                const permission = await Notification.requestPermission();
                log(`📋 Permission result: ${permission}`, 
                    permission === 'granted' ? 'success' : 'warning');
                
                updateStatus('notificationPermission', permission,
                    permission === 'granted' ? 'success' : 
                    permission === 'denied' ? 'error' : 'warning');
                
                if (permission === 'granted') {
                    // Get FCM token
                    log('🔑 Getting FCM token...', 'info');
                    const token = await getToken(messaging, { 
                        vapidKey: vapidKey,
                        serviceWorkerRegistration: registration
                    });
                    
                    if (token) {
                        updateStatus('fcmToken', token.substring(0, 30) + '...', 'success');
                        log('✅ FCM Token: ' + token, 'success');
                        
                        // Copy to clipboard
                        try {
                            await navigator.clipboard.writeText(token);
                            log('📋 Token copied to clipboard', 'success');
                        } catch (e) {
                            log('⚠️ Could not copy to clipboard', 'warning');
                        }
                    }
                }
            } catch (error) {
                log('❌ Error: ' + error.message, 'error');
                console.error(error);
            }
        }

        async function testNotification() {
            log('🧪 Testing browser notification...', 'info');
            
            if (Notification.permission !== 'granted') {
                log('❌ Permission not granted. Request permission first.', 'error');
                return;
            }
            
            try {
                const notification = new Notification('Test Notification', {
                    body: 'This is a test notification from Arradea FCM Test',
                    icon: '/icons/logo-arradea.png',
                    badge: '/icons/logo-arradea.png',
                    tag: 'test-notification',
                    requireInteraction: false
                });
                
                notification.onclick = () => {
                    log('🖱️ Notification clicked', 'info');
                    notification.close();
                };
                
                setTimeout(() => notification.close(), 5000);
                
                log('✅ Test notification shown', 'success');
            } catch (error) {
                log('❌ Error showing notification: ' + error.message, 'error');
            }
        }

        async function checkServiceWorkerDetails() {
            log('⚙️ Checking service worker details...', 'info');
            
            try {
                const registrations = await navigator.serviceWorker.getRegistrations();
                
                if (registrations.length === 0) {
                    log('⚠️ No service workers registered', 'warning');
                    return;
                }
                
                registrations.forEach((registration, index) => {
                    log(`\n📝 Service Worker ${index + 1}:`, 'info');
                    log(`  Scope: ${registration.scope}`, 'info');
                    log(`  Active: ${registration.active ? 'Yes' : 'No'}`, 'info');
                    log(`  Installing: ${registration.installing ? 'Yes' : 'No'}`, 'info');
                    log(`  Waiting: ${registration.waiting ? 'Yes' : 'No'}`, 'info');
                    
                    if (registration.active) {
                        log(`  State: ${registration.active.state}`, 'info');
                        log(`  Script URL: ${registration.active.scriptURL}`, 'info');
                    }
                });
                
                // Check controller
                if (navigator.serviceWorker.controller) {
                    log('\n✅ Page is controlled by service worker', 'success');
                    log(`  Script URL: ${navigator.serviceWorker.controller.scriptURL}`, 'info');
                } else {
                    log('\n⚠️ Page is NOT controlled by service worker', 'warning');
                    log('  Try refreshing the page', 'info');
                }
            } catch (error) {
                log('❌ Error: ' + error.message, 'error');
            }
        }
    </script>
</body>
</html>
