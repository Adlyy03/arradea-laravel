<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abiyu Food Seeder - Test & Verify</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-run {
            background: #667eea;
            color: white;
        }

        .btn-run:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-run:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-reset {
            background: #f56565;
            color: white;
        }

        .btn-reset:hover {
            background: #e53e3e;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 101, 101, 0.4);
        }

        .result {
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            border-radius: 5px;
            padding: 20px;
            margin-top: 20px;
            max-height: 600px;
            overflow-y: auto;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result.success {
            background: #f0fdf4;
            border-color: #86efac;
        }

        .result.error {
            background: #fef2f2;
            border-color: #fca5a5;
        }

        .result.loading {
            background: #fffbeb;
            border-color: #fcd34d;
        }

        .result h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .status-badge.success {
            background: #d1fae5;
            color: #065f46;
        }

        .status-badge.error {
            background: #fee2e2;
            color: #991b1b;
        }

        .status-badge.loading {
            background: #fef3c7;
            color: #92400e;
        }

        .info-section {
            margin-bottom: 20px;
        }

        .info-section h3 {
            color: #555;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 2px solid #e2e8f0;
        }

        .info-item {
            padding: 8px 0;
            color: #666;
            font-size: 14px;
        }

        .info-item strong {
            color: #333;
            min-width: 120px;
            display: inline-block;
        }

        .product-list {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 15px;
        }

        .product-item {
            padding: 15px;
            border-bottom: 1px solid #e2e8f0;
            transition: background 0.2s;
        }

        .product-item:hover {
            background: #f9fafb;
        }

        .product-item:last-child {
            border-bottom: none;
        }

        .product-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .product-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            font-size: 13px;
            color: #666;
            margin-bottom: 10px;
        }

        .product-detail {
            display: flex;
            justify-content: space-between;
        }

        .variant-list {
            background: #f9fafb;
            padding: 10px;
            border-radius: 3px;
            font-size: 12px;
            color: #666;
        }

        .variant-item {
            padding: 5px 0;
            padding-left: 15px;
        }

        .variant-item:before {
            content: "•";
            margin-right: 8px;
            color: #667eea;
        }

        .summary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 5px;
            margin-top: 20px;
        }

        .summary h3 {
            margin-bottom: 15px;
            font-size: 16px;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .summary-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 5px;
            text-align: center;
        }

        .summary-item-value {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .summary-item-label {
            font-size: 12px;
            opacity: 0.9;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-text {
            color: #991b1b;
            font-weight: 500;
        }

        pre {
            background: #1f2937;
            color: #e5e7eb;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌾 Abiyu Food Seeder</h1>
        <p class="subtitle">Test & Verify Data Seeding untuk Seller Abiyu</p>

        <div class="button-group">
            <button class="btn-run" id="runBtn" onclick="runSeeder()">▶️ Jalankan Seeder</button>
            <button class="btn-reset" id="resetBtn" onclick="resetResult()">🔄 Reset</button>
        </div>

        <div class="result" id="result">
            <div class="status-badge loading" id="statusBadge">
                <span class="loading-spinner"></span>
                <span>Loading...</span>
            </div>
            <div id="resultContent"></div>
        </div>
    </div>

    <script>
        async function runSeeder() {
            const btn = document.getElementById('runBtn');
            const result = document.getElementById('result');
            const statusBadge = document.getElementById('statusBadge');
            const resultContent = document.getElementById('resultContent');

            btn.disabled = true;
            result.className = 'result show loading';
            statusBadge.className = 'status-badge loading';
            statusBadge.innerHTML = '<span class="loading-spinner"></span><span>Menjalankan seeder...</span>';
            resultContent.innerHTML = '<p>Mohon tunggu, seeder sedang berjalan...</p>';

            try {
                const response = await fetch('/api/test/abiyu-seeder');
                const data = await response.json();

                if (data.success) {
                    displaySuccess(data);
                } else {
                    displayError(data.error || 'Seeder failed');
                }
            } catch (error) {
                displayError(error.message);
            } finally {
                btn.disabled = false;
            }
        }

        function displaySuccess(data) {
            const result = document.getElementById('result');
            const statusBadge = document.getElementById('statusBadge');
            const resultContent = document.getElementById('resultContent');

            result.className = 'result show success';
            statusBadge.className = 'status-badge success';
            statusBadge.innerHTML = '✅ SUCCESS - Seeder berhasil dijalankan!';

            let html = `
                <div class="info-section">
                    <h3>📦 Seller Information</h3>
                    <div class="info-item"><strong>Name:</strong> ${data.seller.name}</div>
                    <div class="info-item"><strong>Email:</strong> ${data.seller.email}</div>
                    <div class="info-item"><strong>Role:</strong> ${data.seller.role}</div>
                </div>

                <div class="info-section">
                    <h3>🏪 Store Information</h3>
                    <div class="info-item"><strong>Store Name:</strong> ${data.store.name}</div>
                    <div class="info-item"><strong>Description:</strong> ${data.store.description}</div>
                    <div class="info-item"><strong>Address:</strong> ${data.store.address}</div>
                </div>

                <div class="info-section">
                    <h3>🛍️ Products & Variants</h3>
                    <div class="product-list">
            `;

            data.products.forEach((product, idx) => {
                html += `
                    <div class="product-item">
                        <div class="product-name">${idx + 1}. ${product.name}</div>
                        <div class="product-details">
                            <div class="product-detail">
                                <span>💰 Price:</span>
                                <span><strong>Rp ${formatNumber(product.price)}</strong></span>
                            </div>
                            <div class="product-detail">
                                <span>📦 Stock:</span>
                                <span><strong>${product.stock}</strong></span>
                            </div>
                            <div class="product-detail">
                                <span>🏷️ Category:</span>
                                <span><strong>${product.category}</strong></span>
                            </div>
                        </div>
                        ${product.variants.length > 0 ? `
                            <div class="variant-list">
                                <strong>Variants (${product.variants.length}):</strong>
                                ${product.variants.map(v => `
                                    <div class="variant-item">
                                        ${v.name}: Rp ${formatNumber(v.price)} (Stok: ${v.stock})
                                    </div>
                                `).join('')}
                            </div>
                        ` : ''}
                    </div>
                `;
            });

            html += `
                    </div>
                </div>

                <div class="summary">
                    <h3>📊 Summary</h3>
                    <div class="summary-grid">
                        <div class="summary-item">
                            <div class="summary-item-value">${data.summary.total_products}</div>
                            <div class="summary-item-label">Total Products</div>
                        </div>
                        <div class="summary-item">
                            <div class="summary-item-value">${data.summary.total_variants}</div>
                            <div class="summary-item-label">Total Variants</div>
                        </div>
                        <div class="summary-item">
                            <div class="summary-item-value">${data.summary.total_base_stock}</div>
                            <div class="summary-item-label">Total Stock</div>
                        </div>
                    </div>
                </div>
            `;

            resultContent.innerHTML = html;
        }

        function displayError(error) {
            const result = document.getElementById('result');
            const statusBadge = document.getElementById('statusBadge');
            const resultContent = document.getElementById('resultContent');

            result.className = 'result show error';
            statusBadge.className = 'status-badge error';
            statusBadge.innerHTML = '❌ ERROR - Seeder gagal!';

            resultContent.innerHTML = `
                <div style="color: #991b1b; font-weight: 500;">
                    <p>Pesan Error:</p>
                    <pre>${error}</pre>
                </div>
            `;
        }

        function resetResult() {
            document.getElementById('result').className = 'result';
            document.getElementById('resultContent').innerHTML = '';
        }

        function formatNumber(num) {
            return new Intl.NumberFormat('id-ID', {
                minimumFractionDigits: 0,
                maximumFractionDigits: 0
            }).format(num);
        }
    </script>
</body>
</html>
